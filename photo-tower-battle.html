<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WSDLタワー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: #1a1a2e;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Hiragino Sans', 'Meiryo', 'Yu Gothic', sans-serif;
  color: #fff; overflow: hidden; user-select: none;
}

/* ── タイトル画面 ── */
#s-title {
  display: flex; flex-direction: column; align-items: center;
  gap: 20px; padding: 24px 20px; max-width: 400px; width: 100%;
}
.title {
  font-size: 28px; font-weight: bold; text-align: center;
  text-shadow: 0 0 24px rgba(255,200,60,.9); letter-spacing: 1px;
}
.desc { font-size: 13px; color: rgba(255,255,255,.65); text-align: center; line-height: 1.6; }
#btn-start {
  background: linear-gradient(135deg,#4facfe,#00f2fe); border: none;
  border-radius: 50px; color: #fff; font-size: 22px; font-weight: bold;
  padding: 16px 56px; cursor: pointer;
  box-shadow: 0 4px 18px rgba(79,172,254,.5);
}
#btn-start:active { opacity: .85; }
#load-status { font-size: 12px; color: rgba(255,255,255,.45); text-align: center; }

/* ── ゲーム画面 ── */
#s-game { display: none; position: relative; flex-direction: column; align-items: center; }
#gc { display: block; touch-action: none; cursor: crosshair; }
#next-box {
  position: absolute; right: 8px; top: 8px;
  text-align: center; pointer-events: none; z-index: 5;
  background: rgba(0,0,0,.35);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 10px;
  padding: 6px 8px;
}
#next-box .label {
  font-size: 10px; font-weight: bold; letter-spacing: 1px;
  color: rgba(255,255,255,.7); margin-bottom: 4px;
}
#nc { display: block; }

/* ── 回転ボタン ── */
#btn-rotate {
  position: absolute; right: 16px; bottom: 24px;
  width: 58px; height: 58px; border-radius: 50%;
  background: rgba(255,255,255,.18);
  border: 2px solid rgba(255,255,255,.45);
  color: #fff; font-size: 28px; line-height: 1;
  cursor: pointer; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  user-select: none; -webkit-user-select: none;
  transition: background .1s;
}
#btn-rotate:active { background: rgba(255,255,255,.35); }

/* ── ゲームオーバー ── */
#go {
  display: none; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(8,8,24,.92); border-radius: 20px;
  padding: 28px 36px; text-align: center; z-index: 20;
  border: 1px solid rgba(255,255,255,.15); min-width: 200px;
}
#go .emoji { font-size: 44px; margin-bottom: 8px; }
#go h2 { font-size: 24px; margin-bottom: 12px; }
#go .score { font-size: 17px; color: #ffd700; }
#go .best  { font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 20px; }
#go .btn-retry {
  background: linear-gradient(135deg,#f093fb,#f5576c);
  border: none; border-radius: 50px; color: #fff;
  font-size: 17px; font-weight: bold; padding: 12px 32px;
  cursor: pointer; width: 100%; margin-bottom: 10px;
}
#go .btn-title {
  background: none; border: 1px solid rgba(255,255,255,.3);
  border-radius: 50px; color: rgba(255,255,255,.65);
  font-size: 13px; padding: 8px 20px; cursor: pointer; width: 100%;
}

/* ── パッチノート ── */
#patch-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 100;
  align-items: center; justify-content: center;
}
#patch-overlay.open { display: flex; }
#patch-box {
  background: #1a1a2e; border: 1px solid rgba(255,255,255,.2);
  border-radius: 16px; padding: 24px 28px; max-width: 340px; width: 90%;
}
#patch-box h3 { font-size: 18px; margin-bottom: 16px; color: #ffd700; }
#patch-box ul { list-style: none; padding: 0; margin: 0 0 20px; }
#patch-box ul li { font-size: 13px; color: rgba(255,255,255,.8); padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.08); }
#patch-box ul li::before { content: '✦ '; color: #4facfe; }
#patch-close {
  background: none; border: 1px solid rgba(255,255,255,.3);
  border-radius: 50px; color: rgba(255,255,255,.65);
  font-size: 13px; padding: 8px 20px; cursor: pointer; width: 100%;
}
.btn-patch {
  background: none; border: 1px solid rgba(255,255,255,.2);
  border-radius: 50px; color: rgba(255,255,255,.45);
  font-size: 12px; padding: 6px 16px; cursor: pointer;
}

/* ── 対戦ボタン (タイトル) ── */
#btn-battle {
  background: linear-gradient(135deg,#f093fb,#f5576c); border: none;
  border-radius: 50px; color: #fff; font-size: 19px; font-weight: bold;
  padding: 14px 48px; cursor: pointer;
  box-shadow: 0 4px 18px rgba(240,147,251,.4);
}
#btn-battle:disabled { opacity: .45; cursor: default; }
#btn-battle:active { opacity: .85; }

/* ── バトルロビー画面 ── */
#s-battle {
  display: none; flex-direction: column; align-items: center;
  gap: 18px; padding: 24px 20px; max-width: 400px; width: 100%;
}
#battle-create {
  display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%;
}
#btn-create-room {
  background: linear-gradient(135deg,#4facfe,#00f2fe); border: none;
  border-radius: 50px; color: #fff; font-size: 18px; font-weight: bold;
  padding: 14px 44px; cursor: pointer; width: 100%;
  box-shadow: 0 4px 16px rgba(79,172,254,.4);
}
.battle-sep { font-size: 12px; color: rgba(255,255,255,.3); letter-spacing: 2px; }
#room-input {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.3);
  border-radius: 12px; color: #fff; font-size: 28px; font-weight: bold;
  padding: 10px 16px; width: 100%; text-align: center; letter-spacing: 6px;
  outline: none;
}
#room-input::placeholder { color: rgba(255,255,255,.2); letter-spacing: 2px; }
#btn-join-room {
  background: linear-gradient(135deg,#43e97b,#38f9d7); border: none;
  border-radius: 50px; color: #222; font-size: 18px; font-weight: bold;
  padding: 14px 44px; cursor: pointer; width: 100%;
}
#room-display {
  display: none; flex-direction: column; align-items: center; gap: 10px;
  width: 100%;
}
#room-code-display {
  font-size: 52px; font-weight: bold; letter-spacing: 10px;
  color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,.6);
}
.room-label { font-size: 12px; color: rgba(255,255,255,.5); letter-spacing: 1px; }
.waiting-text { font-size: 14px; color: rgba(255,255,255,.65); }
#btn-cancel-battle {
  background: none; border: 1px solid rgba(255,255,255,.25);
  border-radius: 50px; color: rgba(255,255,255,.55);
  font-size: 13px; padding: 9px 24px; cursor: pointer;
}

/* ── ターンインジケーター ── */
#turn-indicator {
  display: none; position: absolute; top: 8px; left: 8px;
  font-size: 13px; font-weight: bold; padding: 7px 14px;
  border-radius: 20px; pointer-events: none; z-index: 10;
  transition: background .3s;
}
#turn-indicator.my-turn    { background: rgba(79,172,254,.35); color: #fff; }
#turn-indicator.their-turn { background: rgba(240,80,80,.35);  color: #fff; }
</style>
</head>
<body>

<!-- タイトル画面 -->
<div id="s-title">
  <div class="title">WSDLタワー</div>
  <div style="font-size:11px; color:rgba(255,255,255,.4); margin-top:-12px;">v2.1</div>
  <div class="desc">台の上に写真キャラを積み上げよう<br>一つでも落としたらゲームオーバー</div>
  <div id="load-status">画像を読み込み中...</div>
  <button id="btn-start" disabled onclick="startSolo()">🎮 ソロプレイ</button>
  <button id="btn-battle" disabled onclick="openBattle()">⚔️ 対戦</button>
  <button class="btn-patch" onclick="openPatch()">📋 パッチノートを確認</button>
</div>

<!-- バトルロビー画面 -->
<div id="s-battle">
  <div class="title">⚔️ 対戦モード</div>
  <div id="battle-create">
    <button id="btn-create-room" onclick="createRoom()">🏠 ルームを作る</button>
    <div class="battle-sep">─── または ───</div>
    <input id="room-input" type="number" inputmode="numeric" placeholder="コード入力" maxlength="4">
    <button id="btn-join-room" onclick="joinRoom()">🚪 参加する</button>
  </div>
  <div id="room-display">
    <div class="room-label">ルームコード</div>
    <div id="room-code-display"></div>
    <div class="waiting-text">相手の参加を待っています...</div>
  </div>
  <button id="btn-cancel-battle" onclick="cancelBattle()">← タイトルへ戻る</button>
</div>

<!-- パッチノートポップアップ -->
<div id="patch-overlay" onclick="closePatch()">
  <div id="patch-box" onclick="event.stopPropagation()">
    <h3>📋 v2.1 パッチノート</h3>
    <ul>
      <li>2台のスマホで遊べる対戦モードを追加</li>
      <li>タイトルにソロ・対戦の選択ボタンを追加</li>
    </ul>
    <h3 style="font-size:15px; color:rgba(255,215,0,.6); margin:16px 0 10px;">📋 v2.0</h3>
    <ul>
      <li>背景の雲を削除</li>
      <li>NEXTボックスに枠と名前表示を追加</li>
      <li>台の摩擦を強化</li>
      <li>オブジェクトの挙動を改善</li>
    </ul>
    <button id="patch-close" onclick="closePatch()">閉じる</button>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="s-game">
  <canvas id="gc"></canvas>
  <div id="next-box">
    <div class="label">NEXT</div>
    <canvas id="nc" width="58" height="58"></canvas>
    <div id="next-name" style="font-size:10px; color:rgba(255,255,255,.8); margin-top:4px;"></div>
  </div>
  <button id="btn-rotate" onclick="rotateDropper()">↻</button>
  <div id="turn-indicator"></div>
  <div id="go">
    <div id="go-emoji" class="emoji">😱</div>
    <h2 id="go-title-text">落としちゃった！</h2>
    <p class="score">積み上げた数: <strong id="go-n">0</strong></p>
    <p id="go-best-row" class="best">ベスト: <strong id="go-b">0</strong></p>
    <button id="go-retry" class="btn-retry" onclick="restartGame()">もう一度！</button>
    <button class="btn-title" onclick="goTitle()">タイトルへ</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>

// ════════════════════════════════════════════════════════
//
//  ★ ここを編集してね ★
//
// ════════════════════════════════════════════════════════

// 【キャラクター設定】
// src  : HTML と同じフォルダに置いた画像のファイル名
// hull : 当たり判定の頂点座標。null にすると透過部分から自動生成。
//        手動で指定する場合は [-1.0, 1.0] の正規化座標で書く。
//          中心 = (0, 0)
//          上端 = y: -1.0 ／ 下端 = y: 1.0
//          左端 = x: -1.0 ／ 右端 = x: 1.0
//        ※ 時計回りでも反時計回りでも OK

const CHARACTERS = [
  {
    src: 'Kota1.png',
    name: 'こうた',
    hull: null,  // 透過PNGなら自動計算でOK
    size: 55,    // サイズ (px)。null にするとランダム
  },
  {
    src: 'Lein1.png',
    name: 'れいん',
    hull: null,
    size: 55,
  },
  {
    src: 'Oozora1.png',
    name: 'おーぞら',
    hull: null,
    size: 40,
  },
  {
    src: 'Raiya1.png',
    name: 'らいや',
    hull: null,
    size: 45,
  },
  {
    src: 'Syatyou1.png',
    name: '社長',
    hull: null,
    size: 70,
  },
  {
    src: 'Minori1.png',
    name: '猿飛ヒルゼン',
    hull: null,
    size: 30,
  },
  {
    src: 'Aniki1.png',
    name: 'アニキ',
    hull: null,
    size: null,
  }
  // hull を手動指定する例（人型のざっくりした形）:
  // {
  //   src: 'chara3.png',
  //   hull: [
  //     { x: -0.25, y: -1.00 },  // 頭の左
  //     { x:  0.25, y: -1.00 },  // 頭の右
  //     { x:  0.50, y: -0.40 },  // 右肩
  //     { x:  0.40, y:  0.20 },  // 右腰
  //     { x:  0.25, y:  1.00 },  // 右足
  //     { x: -0.25, y:  1.00 },  // 左足
  //     { x: -0.40, y:  0.20 },  // 左腰
  //     { x: -0.50, y: -0.40 },  // 左肩
  //   ],
  // },
];

// 【物理設定】
const phyOpts = {
  gravity:     1.2,   // 重力（大きいほど速く落ちる）
  friction:    50000.0,  // 動摩擦（大きいほど滑りにくい）
  fStatic:     50000.0,  // 静止摩擦（積み上げ後のズレに効く）
  restitution: 0.0,   // バウンス（0=跳ねない、1=よく跳ねる）
  fAir:        0.03,  // 空気抵抗
};

// 【オブジェクトのサイズ】 (px) と出現確率
const SIZES = [52, 66, 82];
const PROBS = [0.30, 0.45, 0.25];

// 【台の設定】
const PLAT_W = 260;  // 幅 (px)

// ════════════════════════════════════════════════════════
//  以下はゲームのコード（通常は編集不要）
// ════════════════════════════════════════════════════════

const PROC    = 100;
const PH      = 50;
const ALPHA_TH = 25;
const MAX_HULL = 12;

const GW = Math.min(400, window.innerWidth);
const GH = Math.min(700, window.innerHeight - 4);

const PLAT_H = 14;
const PLAT_X = GW / 2;
const PLAT_Y = Math.round(GH * 0.78);
const DROP_Y = 58;
const DX_MIN = PLAT_X - PLAT_W / 2 - 40;
const DX_MAX = PLAT_X + PLAT_W / 2 + 40;

// ── 画像ロード ──
let procObjs = [];

function loadAll() {
  const statusEl = document.getElementById('load-status');
  let loaded = 0, failed = 0;

  const update = () => {
    const done = loaded + failed;
    statusEl.textContent = `画像 ${done} / ${CHARACTERS.length} 読み込み中...`;
    if (done < CHARACTERS.length) return;

    if (procObjs.length === 0) {
      statusEl.textContent = '⚠ 画像を読み込めませんでした。ファイル名を確認してください。';
      return;
    }
    statusEl.textContent = `✅ ${procObjs.length} キャラ準備完了`;
    document.getElementById('btn-start').disabled  = false;
    document.getElementById('btn-battle').disabled = false;
  };

  CHARACTERS.forEach(ch => {
    const img = new Image();
    img.onload = () => {
      const po = ch.hull ? processManual(img, ch.hull) : processAuto(img);
      if (po) { po.size = ch.size ?? null; po.name = ch.name ?? ''; po.src = ch.src; procObjs.push(po); }
      else failed++;
      loaded++;
      update();
    };
    img.onerror = () => { failed++; update(); };
    img.src = ch.src;
  });

  if (CHARACTERS.length === 0) {
    statusEl.textContent = '⚠ CHARACTERS が空です。';
  }
}

// ── 凸包 (monotone chain) ──
function convexHull(pts) {
  if (pts.length < 3) return pts;
  const s = [...pts].sort((a, b) => a.x !== b.x ? a.x - b.x : a.y - b.y);
  const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
  const lo = [], hi = [];
  for (const p of s) {
    while (lo.length >= 2 && cross(lo.at(-2), lo.at(-1), p) <= 0) lo.pop();
    lo.push(p);
  }
  for (let i = s.length - 1; i >= 0; i--) {
    const p = s[i];
    while (hi.length >= 2 && cross(hi.at(-2), hi.at(-1), p) <= 0) hi.pop();
    hi.push(p);
  }
  hi.pop(); lo.pop();
  return lo.concat(hi);
}

// ── 透過PNGから自動生成 ──
function processAuto(img) {
  const ar = img.naturalWidth / img.naturalHeight;
  let dw, dh;
  if (ar >= 1) { dw = PROC; dh = PROC / ar; }
  else          { dh = PROC; dw = PROC * ar; }
  const dx = (PROC - dw) / 2, dy = (PROC - dh) / 2;

  const pc = Object.assign(document.createElement('canvas'), { width: PROC, height: PROC });
  const px = pc.getContext('2d');
  px.drawImage(img, dx, dy, dw, dh);

  let data;
  try {
    data = px.getImageData(0, 0, PROC, PROC).data;
  } catch (e) {
    // file:// で開いた場合は getImageData がブロックされる → 四角形フォールバック
    console.warn('getImageData blocked (file:// protocol). Using rectangle hull.');
    return finalize(img, [
      { x: -PH, y: -PH }, { x: PH, y: -PH },
      { x: PH, y: PH },   { x: -PH, y: PH },
    ], dw, dh);
  }

  const pts = [];
  for (let y = 0; y < PROC; y += 3)
    for (let x = 0; x < PROC; x += 3)
      if (data[(y * PROC + x) * 4 + 3] > ALPHA_TH)
        pts.push({ x: x - PH, y: y - PH });

  if (pts.length < 3) return null;

  let hull = convexHull(pts);
  if (hull.length > MAX_HULL) {
    const stride = hull.length / MAX_HULL;
    hull = Array.from({ length: MAX_HULL }, (_, i) => hull[Math.round(i * stride) % hull.length]);
  }
  if (hull.length < 3) return null;

  return finalize(img, hull, dw, dh);
}

// ── 手動座標 [-1,1] から生成 ──
function processManual(img, rawHull) {
  // [-1,1] → [-PH, PH] に変換
  const hull = rawHull.map(p => ({ x: p.x * PH, y: p.y * PH }));
  if (hull.length < 3) return null;

  const ar = img.naturalWidth / img.naturalHeight;
  let dw, dh;
  if (ar >= 1) { dw = PROC; dh = PROC / ar; }
  else          { dh = PROC; dw = PROC * ar; }

  return finalize(img, hull, dw, dh);
}

// 頂点平均を原点に揃えて返す（Matter.js の内部挙動に合わせる）
function finalize(img, hull, dw, dh) {
  const avgX = hull.reduce((s, p) => s + p.x, 0) / hull.length;
  const avgY = hull.reduce((s, p) => s + p.y, 0) / hull.length;
  const hullC  = hull.map(p => ({ x: p.x - avgX, y: p.y - avgY }));
  const imgOff = { x: -avgX, y: -avgY };
  return { img, hullC, imgOff, dw, dh };
}

// ── アイテム生成 ──
function pickSize() {
  let r = Math.random(), a = 0;
  for (let i = 0; i < PROBS.length; i++) { a += PROBS[i]; if (r < a) return SIZES[i]; }
  return SIZES[0];
}

function makeItem(po) {
  const ts    = po.size ?? pickSize();
  const scale = ts / PH;
  return {
    img:        po.img,
    name:       po.name,
    src:        po.src,        // バトル同期用
    actualSize: ts,            // バトル同期用
    hull:     po.hullC.map(p => ({ x: p.x * scale, y: p.y * scale })),
    imgOff:   { x: po.imgOff.x * scale, y: po.imgOff.y * scale },
    displayW: po.dw * scale,
    displayH: po.dh * scale,
  };
}

// ── ゲーム状態 ──
let engine, world;
let bodies   = [];
let pending  = null;
let nextItem = null;
let dropperX  = PLAT_X;
let dropAngle = 0;   // 現在の回転角 (rad)
let canDrop  = true;
let isGO     = false;
let score    = 0;
let best     = 0;
let rafId    = null;
let lastT    = 0;
let inputReady = false;
let gc, ctx, nc, nctx;

// ── バトルモード状態 ──
let isBattleMode  = false;
let isMyTurn      = false;
let battleChannel = null;
let sbClient      = null;

// ── 開始 ──
function startSolo() {
  isBattleMode = false;
  isMyTurn     = false;
  startGame('s-title');
}

function startGame(fromScreen) {
  document.getElementById(fromScreen || 's-title').style.display = 'none';
  const sg = document.getElementById('s-game');
  sg.style.display = 'flex';

  gc  = document.getElementById('gc');
  gc.width = GW; gc.height = GH;
  ctx = gc.getContext('2d');
  nc   = document.getElementById('nc');
  nctx = nc.getContext('2d');

  initPhysics();
  if (!inputReady) { bindInput(); inputReady = true; }
  resetState();
  updateTurnIndicator();

  lastT = performance.now();
  rafId = requestAnimationFrame(loop);
}

function initPhysics() {
  if (engine) { Matter.World.clear(world); Matter.Engine.clear(engine); }
  engine = Matter.Engine.create({ enableSleeping: true });
  engine.positionIterations = 50;
  engine.velocityIterations = 50;
  world  = engine.world;
  engine.gravity.y = phyOpts.gravity;

  Matter.World.add(world,
    Matter.Bodies.rectangle(PLAT_X, PLAT_Y, PLAT_W, PLAT_H, {
      isStatic: true, label: 'plat',
      friction: 50000.0, frictionStatic: 50000.0, restitution: 0.0,
    })
  );
}

function randProc() { return procObjs[Math.floor(Math.random() * procObjs.length)]; }

function resetState() {
  bodies    = [];
  score     = 0;
  isGO      = false;
  canDrop   = true;
  dropperX  = PLAT_X;
  dropAngle = 0;
  pending  = makeItem(randProc());
  nextItem = makeItem(randProc());
  drawNext();
  document.getElementById('go').style.display = 'none';
}

// ── 入力 ──
function bindInput() {
  const el = document.getElementById('gc');
  const getX = e => {
    const r = el.getBoundingClientRect();
    return (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  };
  el.addEventListener('mousemove', e => { if (!isGO && canDrop) dropperX = clamp(getX(e)); });
  el.addEventListener('click', tryDrop);
  el.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!isGO && canDrop) dropperX = clamp(getX(e));
  }, { passive: false });
  el.addEventListener('touchend', e => { e.preventDefault(); tryDrop(); }, { passive: false });
}

function clamp(x) { return Math.max(DX_MIN, Math.min(DX_MAX, x)); }

// ── 回転 ──
function rotateDropper() {
  if (isGO || !canDrop) return;
  dropAngle = (dropAngle + Math.PI / 4) % (Math.PI * 2);
}

// ── ドロップ ──
function tryDrop() {
  if (isGO || !canDrop || !pending) return;
  if (isBattleMode && !isMyTurn) return;

  // バトル同期用に保存
  const syncSrc   = pending.src;
  const syncSize  = pending.actualSize;
  const syncX     = dropperX;
  const syncAngle = dropAngle;

  dropBody(pending, dropperX, dropAngle);

  score++;
  dropAngle = 0;
  pending  = nextItem;
  nextItem = makeItem(randProc());
  drawNext();

  canDrop = false;

  if (isBattleMode) {
    isMyTurn = false;
    updateTurnIndicator();
    sendDrop(syncSrc, syncSize, syncX, syncAngle);
  }

  setTimeout(() => { canDrop = true; }, 650);
}

// 物理ボディを生成してワールドに追加（自分のドロップ・受信ドロップ共通）
function dropBody(item, x, angle) {
  const { hull, imgOff, displayW, displayH, img } = item;
  let body;
  try {
    body = Matter.Bodies.fromVertices(x, DROP_Y, hull, {
      restitution: phyOpts.restitution, friction: phyOpts.friction,
      frictionStatic: phyOpts.fStatic, frictionAir: phyOpts.fAir, density: 0.004,
    });
    if (!body?.vertices?.length) throw 0;
  } catch (_) {
    const r = Math.max(...hull.map(p => Math.hypot(p.x, p.y))) || 40;
    body = Matter.Bodies.circle(x, DROP_Y, r, {
      restitution: phyOpts.restitution, friction: phyOpts.friction,
      frictionStatic: phyOpts.fStatic, frictionAir: phyOpts.fAir, density: 0.004,
    });
  }
  const corrX = x       - body.position.x;
  const corrY = DROP_Y  - body.position.y;
  Matter.Body.setAngle(body, angle);
  bodies.push({ body, img, displayW, displayH, imgOff: { x: imgOff.x + corrX, y: imgOff.y + corrY } });
  Matter.World.add(world, body);
}

// ── ゲームループ ──
function loop(t) {
  const dt = Math.min(t - lastT, 50);
  lastT = t;
  if (!isGO) { Matter.Engine.update(engine, dt); checkFall(); }
  render();
  rafId = requestAnimationFrame(loop);
}

function checkFall() {
  for (const obj of bodies) {
    if (obj.body.position.y > GH + 80) { triggerGameOver(); return; }
  }
}


function triggerGameOver(iWin = false) {
  if (isGO) return;
  isGO = true;

  if (isBattleMode) {
    // 相手に通知（勝ち側が「負け」を送る → 受け取った方が「勝ち」）
    if (!iWin && battleChannel) {
      battleChannel.send({ type: 'broadcast', event: 'gameover', payload: {} });
    }
    document.getElementById('go-emoji').textContent      = iWin ? '🏆' : '😭';
    document.getElementById('go-title-text').textContent = iWin ? 'あなたの勝ち！' : 'あなたの負け...';
    document.getElementById('go-best-row').style.display = 'none';
    document.getElementById('go-retry').style.display    = 'none';
  } else {
    if (score > best) best = score;
    document.getElementById('go-emoji').textContent      = '😱';
    document.getElementById('go-title-text').textContent = '落としちゃった！';
    document.getElementById('go-best-row').style.display = '';
    document.getElementById('go-retry').style.display    = '';
    document.getElementById('go-b').textContent = best;
  }

  document.getElementById('go-n').textContent = score;
  document.getElementById('go').style.display = 'block';
}

// ── 描画 ──
function render() {
  ctx.clearRect(0, 0, GW, GH);

  const sky = ctx.createLinearGradient(0, 0, 0, GH);
  sky.addColorStop(0,    '#87CEEB');
  sky.addColorStop(0.55, '#B8E4F8');
  sky.addColorStop(0.80, '#D0EDB8');
  sky.addColorStop(1,    '#7AB857');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, GW, GH);

  drawPlatform();

  for (const obj of bodies) drawBody(obj);

  if (pending && canDrop && !isGO) {
    const { img, displayW, displayH, imgOff } = pending;
    ctx.save();
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(dropperX, DROP_Y + displayH * 0.5);
    ctx.lineTo(dropperX, PLAT_Y - PLAT_H / 2);
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.82;
    ctx.translate(dropperX, DROP_Y);
    ctx.rotate(dropAngle);
    ctx.drawImage(img, imgOff.x - displayW / 2, imgOff.y - displayH / 2, displayW, displayH);
    ctx.restore();
  }

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,.48)';
  rrect(ctx, 8, 8, 126, 36, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px "Hiragino Sans",Meiryo,sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏆 ' + score + '個', 16, 27);
  ctx.restore();
}

function drawBody(obj) {
  const { body, img, displayW, displayH, imgOff } = obj;
  ctx.save();
  ctx.translate(body.position.x, body.position.y);
  ctx.rotate(body.angle);
  ctx.drawImage(img, imgOff.x - displayW / 2, imgOff.y - displayH / 2, displayW, displayH);
  ctx.restore();
}

function drawPlatform() {
  const px = PLAT_X - PLAT_W / 2, py = PLAT_Y - PLAT_H / 2;
  const legW = 10, legH = GH - PLAT_Y + 10;

  ctx.save();
  const lg = ctx.createLinearGradient(0, PLAT_Y, 0, PLAT_Y + legH);
  lg.addColorStop(0, '#7a5018'); lg.addColorStop(1, '#3a2008');
  ctx.fillStyle = lg;
  ctx.fillRect(px + 18, PLAT_Y, legW, legH);
  ctx.fillRect(px + PLAT_W - 18 - legW, PLAT_Y, legW, legH);
  ctx.restore();

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,.22)';
  rrect(ctx, px + 5, py + 6, PLAT_W, PLAT_H + 4, 5); ctx.fill();
  const pg = ctx.createLinearGradient(0, py, 0, py + PLAT_H);
  pg.addColorStop(0, '#f0c060'); pg.addColorStop(0.35, '#c88a28'); pg.addColorStop(1, '#7a5010');
  ctx.fillStyle = pg;
  rrect(ctx, px, py, PLAT_W, PLAT_H, 5); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.28)';
  ctx.fillRect(px + 6, py + 2, PLAT_W - 12, 4);
  ctx.strokeStyle = 'rgba(0,0,0,.12)'; ctx.lineWidth = 1;
  for (let gx = px + 24; gx < px + PLAT_W - 12; gx += 26) {
    ctx.beginPath(); ctx.moveTo(gx, py + 2); ctx.lineTo(gx + 4, py + PLAT_H - 2); ctx.stroke();
  }
  ctx.restore();
}

function drawClouds() {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,.82)';
  [[55,45,0.9],[200,25,0.7],[340,55,0.85]].forEach(([cx,cy,s]) => {
    ctx.beginPath();
    ctx.arc(cx, cy, 22*s, 0, Math.PI*2);
    ctx.arc(cx+18*s, cy-8*s, 16*s, 0, Math.PI*2);
    ctx.arc(cx+34*s, cy+3*s, 18*s, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.restore();
}

function drawNext() {
  const sz = 58;
  nc.width = nc.height = sz;
  nctx.clearRect(0, 0, sz, sz);
  if (!nextItem) return;
  const { img, name, displayW, displayH, imgOff } = nextItem;
  const s = Math.min((sz-4)/displayW, (sz-4)/displayH);
  nctx.save();
  nctx.translate(sz/2, sz/2);
  nctx.drawImage(img, (imgOff.x - displayW/2)*s, (imgOff.y - displayH/2)*s, displayW*s, displayH*s);
  nctx.restore();
  document.getElementById('next-name').textContent = name ?? '';
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── リスタート / タイトルへ ──
function restartGame() {
  cancelAnimationFrame(rafId);
  initPhysics();
  resetState();
  lastT = performance.now();
  rafId = requestAnimationFrame(loop);
}

function goTitle() {
  cancelAnimationFrame(rafId);
  // バトルチャンネルを切断
  if (battleChannel) { battleChannel.unsubscribe(); battleChannel = null; }
  isBattleMode = false;
  isMyTurn     = false;
  document.getElementById('go').style.display     = 'none';
  document.getElementById('s-game').style.display  = 'none';
  document.getElementById('s-battle').style.display = 'none';
  document.getElementById('s-title').style.display  = 'flex';
}

// ── パッチノート ──
function openPatch()  { document.getElementById('patch-overlay').classList.add('open'); }
function closePatch() { document.getElementById('patch-overlay').classList.remove('open'); }

const SUPABASE_URL = 'https://hevfrfgnuganjnrjivgw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_e8tL2pXp_19HriWlgHugMQ_G6vI6Rgd';

function initSupabase() {
  return new Promise((resolve, reject) => {
    if (sbClient) { resolve(); return; }
    if (window.supabase) {
      sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      resolve(); return;
    }
    // 対戦ボタンを押したときだけ動的にロード
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
    s.onload = () => {
      sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      resolve();
    };
    s.onerror = () => reject(new Error('Supabase の読み込みに失敗しました'));
    document.head.appendChild(s);
  });
}

// ── バトルロビーを開く ──
function openBattle() {
  document.getElementById('s-title').style.display  = 'none';
  document.getElementById('s-battle').style.display = 'flex';
  // リセット表示
  document.getElementById('battle-create').style.display  = 'flex';
  document.getElementById('room-display').style.display   = 'none';
  document.getElementById('room-input').value = '';
}

// ── キャンセル → タイトルへ ──
function cancelBattle() {
  if (battleChannel) { battleChannel.unsubscribe(); battleChannel = null; }
  document.getElementById('s-battle').style.display = 'none';
  document.getElementById('s-title').style.display  = 'flex';
}

// ── ルームコード生成 ──
function genCode() {
  return String(Math.floor(1000 + Math.random() * 9000));
}

// ── ルームを作る（ホスト） ──
async function createRoom() {
  document.getElementById('btn-create-room').disabled = true;
  document.getElementById('btn-create-room').textContent = '接続中...';
  try {
    await initSupabase();
  } catch (e) {
    alert('接続に失敗しました。ネットを確認してね。');
    document.getElementById('btn-create-room').disabled = false;
    document.getElementById('btn-create-room').textContent = '🏠 ルームを作る';
    return;
  }
  const code = genCode();
  isMyTurn = true;  // ホストが先攻

  document.getElementById('battle-create').style.display = 'none';
  document.getElementById('room-display').style.display  = 'flex';
  document.getElementById('room-code-display').textContent = code;

  joinChannel(code, true);
}

// ── ルームに参加（ゲスト） ──
async function joinRoom() {
  const code = document.getElementById('room-input').value.trim();
  if (code.length < 4) { alert('4桁のコードを入力してね'); return; }

  document.getElementById('btn-join-room').disabled = true;
  document.getElementById('btn-join-room').textContent = '接続中...';
  try {
    await initSupabase();
  } catch (e) {
    alert('接続に失敗しました。ネットを確認してね。');
    document.getElementById('btn-join-room').disabled = false;
    document.getElementById('btn-join-room').textContent = '🚪 参加する';
    return;
  }
  isMyTurn = false; // ゲストが後攻

  document.getElementById('battle-create').style.display = 'none';
  document.getElementById('room-display').style.display  = 'flex';
  document.getElementById('room-code-display').textContent = code;
  document.querySelector('#room-display .waiting-text').textContent = '接続中...';

  joinChannel(code, false);
}

// ── Supabase チャンネルに接続 ──
function joinChannel(code, isHost) {
  if (battleChannel) battleChannel.unsubscribe();

  battleChannel = sbClient.channel('room:' + code, {
    config: { broadcast: { self: false } }
  });

  battleChannel
    .on('broadcast', { event: 'ready' }, () => {
      // ゲストが参加した → ホストがゲームスタート指示を出す
      if (isHost) {
        battleChannel.send({ type: 'broadcast', event: 'start', payload: {} });
        startBattleGame();
      }
    })
    .on('broadcast', { event: 'start' }, () => {
      // ホストからスタート指示を受けた → ゲストもゲーム開始
      if (!isHost) startBattleGame();
    })
    .on('broadcast', { event: 'drop' }, ({ payload }) => {
      receiveDrop(payload);
    })
    .on('broadcast', { event: 'gameover' }, () => {
      // 相手が落とした → 自分の勝ち
      triggerGameOver(true);
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED' && !isHost) {
        // ゲストが接続完了 → ホストに通知
        battleChannel.send({ type: 'broadcast', event: 'ready', payload: {} });        document.querySelector('#room-display .waiting-text').textContent = 'ホストの開始を待っています...';
      }
    });
}

// ── バトルゲーム開始 ──
function startBattleGame() {
  isBattleMode = true;
  startGame('s-battle');
}

// ── 自分のドロップを相手に送信 ──
function sendDrop(src, size, x, angle) {
  if (!battleChannel) return;
  battleChannel.send({
    type: 'broadcast', event: 'drop',
    payload: { src, size, x, angle }
  });
}

// ── 相手のドロップを受信して物理シミュレーションに反映 ──
function receiveDrop({ src, size, x, angle }) {
  const po = procObjs.find(p => p.src === src);
  if (!po || isGO) return;

  const scale  = size / PH;
  const item = {
    img:      po.img,
    hull:     po.hullC.map(p => ({ x: p.x * scale, y: p.y * scale })),
    imgOff:   { x: po.imgOff.x * scale, y: po.imgOff.y * scale },
    displayW: po.dw * scale,
    displayH: po.dh * scale,
  };

  dropBody(item, x, angle);
  score++;

  isMyTurn = true;
  updateTurnIndicator();
}

// ── ターンインジケーター更新 ──
function updateTurnIndicator() {
  const el = document.getElementById('turn-indicator');
  if (!isBattleMode) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  if (isMyTurn) {
    el.textContent = '👆 あなたのターン';
    el.className   = 'my-turn';
  } else {
    el.textContent = '⏳ 相手のターン';
    el.className   = 'their-turn';
  }
}

loadAll();
